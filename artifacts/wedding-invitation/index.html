<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Mohammad &amp; Renad — Wedding Invitation</title>
    <meta name="description" content="With love and joy, we invite you to celebrate our wedding day with us. Saturday, July 25, 2026 · Tal Pine, Amman." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#F9F3F3" />
    <!-- The card ships its own EN/AR copy and switches dir="rtl" per element
         under a root that's declared a single lang. Some Android Chrome
         builds see that mismatch and silently machine-translate the page,
         which mangles guest names and headings into phonetic nonsense
         (reported in production). These stop that auto-translation outright
         instead of relying on Chrome to guess correctly. -->
    <meta name="google" content="notranslate" />
    <meta name="googlebot" content="notranslate" />
    <meta name="color-scheme" content="light" />
    <meta property="og:title" content="Mohammad &amp; Renad — Wedding Invitation" />
    <meta property="og:description" content="With love and joy, we invite you to celebrate our wedding day with us. Saturday, July 25, 2026 · Tal Pine, Amman." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mohammad &amp; Renad — Wedding Invitation" />
    <meta name="twitter:description" content="With love and joy, we invite you to celebrate our wedding day with us. Saturday, July 25, 2026 · Tal Pine, Amman." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Warm the browser cache for the default garland art so it's already
         decoded by the time the envelope opens, instead of popping in late. -->
    <link rel="preload" as="image" href="/garland.svg" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
