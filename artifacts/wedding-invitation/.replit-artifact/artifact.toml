kind = "web"
previewPath = "/"
title = "Mohammad & Renad Wedding Invitation"
version = "1.0.0"
id = "artifacts/wedding-invitation"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19315

[services.development]
run = "pnpm --filter @workspace/wedding-invitation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wedding-invitation", "run", "build" ]
serve = "static"
publicDir = "artifacts/wedding-invitation/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19315"
BASE_PATH = "/"
